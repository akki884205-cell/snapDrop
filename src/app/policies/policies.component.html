<div class="activation-container">
  <div class="checklist-card">
    <div class="header-section">
      <h2 class="checklist-title">Activation Checklist</h2>
      <button class="dropdown-btn" (click)="onDropdownClick()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 10l5 5 5-5z"/>
        </svg>
      </button>
    </div>
    
    <div class="checklist-items">
      <div *ngFor="let item of checklistItems" class="checklist-item">
        <div class="item-content">
          <div class="item-icon" [class.completed]="item.completed">
            <svg *ngIf="item.completed" width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
            <div *ngIf="!item.completed" class="icon-dot"></div>
          </div>
          <span class="item-label">{{ item.label }}</span>
        </div>
        <div class="toggle-switch" [class.active]="item.active" (click)="onToggleItem(item.id)">
          <div class="toggle-handle"></div>
        </div>
      </div>
    </div>
  </div>
</div>
