<div class="world-map" role="img" [attr.aria-label]="ariaLabel">
  <svg [attr.width]="width" [attr.height]="height">
    <rect x="0" y="0" [attr.width]="width" [attr.height]="height" class="map-bg"/>
    <g>
      <ng-container *ngFor="let p of points">
        <circle [attr.cx]="p.x" [attr.cy]="p.y" [attr.r]="p.r" [attr.fill]="p.color">
          <title>{{ p.label }}: {{ p.value | number }}</title>
        </circle>
      </ng-container>
    </g>
  </svg>
</div>
