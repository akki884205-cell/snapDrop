<div class="world-map" role="img" [attr.aria-label]="ariaLabel">
  <svg [attr.width]="width" [attr.height]="height">
    <rect x="0" y="0" [attr.width]="width" [attr.height]="height" class="map-bg"/>
    <g>
      <ng-container *ngFor="let p of points">
        <g class="bubble-group" [class.selected]="highlightCountry === p.label" (click)="onBubbleClick(p.label)">
          <circle [attr.cx]="p.x" [attr.cy]="p.y" [attr.r]="p.r" [attr.fill]="p.color">
            <title>{{ p.label }}: {{ p.value | number }}</title>
          </circle>
          <line class="label-link" [attr.x1]="p.x" [attr.y1]="p.y" [attr.x2]="p.labelX - 4" [attr.y2]="p.labelY - 4"></line>
          <text [attr.x]="p.labelX" [attr.y]="p.labelY" class="bubble-label">{{ p.label }} ({{ p.value | number }})</text>
        </g>
      </ng-container>
    </g>
  </svg>
</div>
